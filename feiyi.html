<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非遗餐饮门店榜单 · 2026中国菜申遗参考</title>
<style>
  :root{--red:#9e1b1b;--red-light:#c0392b;--gold:#d4af37;--gold-light:#f0d98c;--cream:#fdf6e3;--ink:#2c1810;--paper:#fffaf0;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;background:linear-gradient(160deg,#7a1010 0%,#9e1b1b 30%,#5c0f0f 100%);background-attachment:fixed;color:var(--ink);min-height:100vh;padding-bottom:60px;}
  .container{max-width:1280px;margin:0 auto;padding:0 16px;}
  header{text-align:center;padding:40px 16px 28px;color:var(--gold-light);}
  header .seal{display:inline-block;border:3px solid var(--gold);border-radius:8px;padding:18px 38px;background:rgba(0,0,0,0.18);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
  header h1{font-size:2.4rem;letter-spacing:6px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
  header .subtitle{margin-top:10px;font-size:1rem;color:var(--gold-light);letter-spacing:3px;}
  header .tagline{margin-top:6px;font-size:0.85rem;color:rgba(255,255,255,0.7);}
  .stats{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:24px 0 8px;}
  .stat-card{background:linear-gradient(145deg,var(--paper),var(--cream));border:2px solid var(--gold);border-radius:12px;padding:16px 26px;min-width:130px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,0.25);}
  .stat-card .num{font-size:2rem;font-weight:800;color:var(--red);line-height:1;}
  .stat-card .label{margin-top:6px;font-size:0.82rem;color:#7a5c3e;letter-spacing:1px;}
  .filters{background:rgba(253,246,227,0.96);border:2px solid var(--gold);border-radius:14px;padding:18px;margin:26px 0;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;box-shadow:0 4px 16px rgba(0,0,0,0.25);}
  .filters .field{display:flex;flex-direction:column;gap:4px;}
  .filters label{font-size:0.78rem;color:var(--red);font-weight:600;letter-spacing:1px;}
  .filters select,.filters input{border:1.5px solid var(--gold);border-radius:8px;padding:8px 12px;font-size:0.9rem;background:#fff;color:var(--ink);outline:none;min-width:150px;transition:border-color 0.2s;}
  .filters select:focus,.filters input:focus{border-color:var(--red);}
  .filters .search{flex:1;min-width:200px;}
  .filters .search input{width:100%;}
  .filters .reset-btn{background:var(--red);color:var(--gold-light);border:none;border-radius:8px;padding:9px 18px;font-size:0.9rem;cursor:pointer;font-weight:600;letter-spacing:1px;transition:background 0.2s;}
  .filters .reset-btn:hover{background:var(--red-light);}
  .result-info{color:var(--gold-light);font-size:0.9rem;margin-bottom:16px;text-align:center;letter-spacing:1px;}
  .city-block{background:rgba(255,250,240,0.97);border-radius:14px;margin-bottom:22px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.28);border:1px solid var(--gold);}
  .city-header{background:linear-gradient(90deg,var(--red),var(--red-light));color:#fff;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
  .city-header .city-name{font-size:1.3rem;font-weight:700;letter-spacing:3px;display:flex;align-items:center;gap:10px;}
  .city-header .city-name::before{content:"\25A3";color:var(--gold-light);}
  .city-header .city-count{background:var(--gold);color:var(--red);border-radius:20px;padding:4px 14px;font-size:0.85rem;font-weight:700;}
  .city-body{padding:16px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
  .city-block.collapsed .city-body{display:none;}
  .shop-card{background:#fff;border:1px solid #ecd9b0;border-left:5px solid var(--gold);border-radius:10px;padding:14px 16px;transition:transform 0.15s,box-shadow 0.15s;}
  .shop-card:hover{transform:translateY(-3px);box-shadow:0 8px 18px rgba(158,27,27,0.18);border-left-color:var(--red);}
  .shop-card .shop-name{font-size:1.12rem;font-weight:700;color:var(--red);margin-bottom:8px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
  .badge{font-size:0.7rem;padding:2px 9px;border-radius:12px;font-weight:600;letter-spacing:0.5px;white-space:nowrap;}
  .badge-renlei{background:#6b21a8;color:#fff;}
  .badge-guojia{background:var(--red);color:var(--gold-light);}
  .badge-sheng{background:#b8860b;color:#fff;}
  .badge-shi{background:#2c7a4b;color:#fff;}
  .badge-qu{background:#5a6b7a;color:#fff;}
  .badge-type{background:#f0e4c8;color:#8a6d3b;border:1px solid #d4af37;}
  .shop-card .row{font-size:0.86rem;color:#5a4632;margin:3px 0;line-height:1.5;}
  .shop-card .row .k{color:#9e8050;font-weight:600;}
  .shop-card .note{font-size:0.82rem;color:#7a6448;margin-top:6px;padding-top:6px;border-top:1px dashed #e0cca0;font-style:italic;}
  .badge-conf-a{background:#1a7f37;color:#fff;font-size:0.65rem;}
  .badge-conf-b{background:#9a6700;color:#fff;font-size:0.65rem;}
  .badge-conf-c{background:#8b949e;color:#fff;font-size:0.65rem;}
  .verify-info{font-size:0.8rem;margin-top:6px;padding:5px 10px;border-radius:6px;line-height:1.5;}
  .verify-info.va{color:#1a7f37;background:#f0fff4;border-left:3px solid #1a7f37;}
  .verify-info.vb{color:#9a6700;background:#fff8e1;border-left:3px solid #9a6700;}
  .verify-info.vc{color:#6b7280;background:#f6f8fa;border-left:3px solid #8b949e;}
.shop-card .source{margin-top:8px;font-size:0.8rem;}
.shop-card .source a{color:var(--red-light);text-decoration:none;border-bottom:1px dotted var(--red-light);}
.shop-card .source a:hover{color:var(--red);border-bottom-style:solid;}
.shop-card .poi-link{margin-top:6px;font-size:0.8rem;}
.shop-card .poi-link a.poi-direct{color:#06b6d4;text-decoration:none;border-bottom:1px dotted #06b6d4;font-weight:500;}
.shop-card .poi-link a.poi-direct:hover{color:#0891b2;border-bottom-style:solid;}
.shop-card .poi-link a.poi-search{color:#8b5cf6;text-decoration:none;border-bottom:1px dotted #8b5cf6;font-style:italic;}
.shop-card .poi-link a.poi-search:hover{color:#7c3aed;border-bottom-style:solid;}
  .empty{text-align:center;color:var(--gold-light);padding:60px 20px;font-size:1.1rem;}
  footer{text-align:center;color:rgba(255,255,255,0.6);font-size:0.8rem;margin-top:40px;line-height:1.8;padding:0 16px;}
  @media(max-width:640px){header h1{font-size:1.6rem;letter-spacing:3px;}.city-body{grid-template-columns:1fr;}.filters select,.filters input{min-width:120px;}.stat-card{min-width:100px;padding:12px 16px;}.stat-card .num{font-size:1.5rem;}}
</style>
</head>

  <header>
    <div class="seal">

      <div class="subtitle">中 华 老 字 号 · 饮 食 类 非 物 质 文 化 遗 产</div>

    <div class="result-info" id="resultInfo"></div>
    <div id="content"></div>
  </div>

  <footer>

<script>
(function(){
  var raw = document.getElementById('ihData').textContent;
  var data = JSON.parse(raw);

  var levelOrder = {"人类非遗":0,"国家级":1,"省级":2,"市级":3,"区级":4};
  var badgeClass = {"人类非遗":"badge-renlei","国家级":"badge-guojia","省级":"badge-sheng","市级":"badge-shi","区级":"badge-qu"};

  // 大众点评城市ID映射
  var dpCityId = {"北京":2,"上海":1,"广州":4,"深圳":7,"成都":8,"重庆":158,"武汉":5,"杭州":3,"南京":9,"西安":17,"长沙":26,"天津":10,"苏州":6,"郑州":160,"昆明":267,"福州":30,"济南":20,"合肥":127,"南昌":107,"贵阳":248,"兰州":801,"太原":88,"南宁":90,"海口":125,"拉萨":394,"呼和浩特":150,"银川":802,"西宁":803,"乌鲁木齐":804,"哈尔滨":15,"长春":55,"沈阳":12};

  // 标准化级别：将含"人类非遗"备注的国家级单独标记
  data.forEach(function(d){
    if((d['备注']||'').indexOf('人类非遗') !== -1){ d['_displayLevel'] = '人类非遗'; }
    else { d['_displayLevel'] = d['级别']; }
  });

  // 保持城市首次出现顺序
  var cityOrder = [];
  data.forEach(function(d){ if(cityOrder.indexOf(d['城市'])===-1) cityOrder.push(d['城市']); });

  var elCity = document.getElementById('filterCity');
  var elLevel = document.getElementById('filterLevel');
  var elType = document.getElementById('filterType');
  var elConf = document.getElementById('filterConf');
  var elKeyword = document.getElementById('filterKeyword');
  var elContent = document.getElementById('content');
  var elStats = document.getElementById('stats');
  var elInfo = document.getElementById('resultInfo');

  // 填充下拉
  cityOrder.forEach(function(c){
    var o = document.createElement('option'); o.value=c; o.textContent=c; elCity.appendChild(o);
  });
  var levels = [];
  data.forEach(function(d){ if(levels.indexOf(d['_displayLevel'])===-1) levels.push(d['_displayLevel']); });
  levels.sort(function(a,b){ return (levelOrder[a]==null?9:levelOrder[a]) - (levelOrder[b]==null?9:levelOrder[b]); });
  levels.forEach(function(l){ var o=document.createElement('option'); o.value=l; o.textContent=l; elLevel.appendChild(o); });
  var types = [];
  data.forEach(function(d){ if(types.indexOf(d['类型'])===-1) types.push(d['类型']); });
  types.forEach(function(t){ var o=document.createElement('option'); o.value=t; o.textContent=t; elType.appendChild(o); });

  // 顶部统计（基于全量）
  function renderStats(){
    var totalShops = data.length;
    var totalCities = cityOrder.length;
    var national = data.filter(function(d){ return d['级别']==='国家级'; }).length;
    var human = data.filter(function(d){ return d['_displayLevel']==='人类非遗'; }).length;
    var prov = data.filter(function(d){ return d['级别']==='省级'; }).length;
    var confA = data.filter(function(d){ return d['可信度']==='A'; }).length;
    var confB = data.filter(function(d){ var c=d['可信度'];return c==='B'||c==='B+'; }).length;
    var confC = data.filter(function(d){ return d['可信度']==='C'; }).length;
    var stats = [
      {num: totalShops, label: '门店总数'},
      {num: totalCities, label: '覆盖城市'},
      {num: confA, label: 'A·可验证'},
      {num: confB, label: 'B·可追溯'},
      {num: confC, label: 'C·待核实'}
    ];
    elStats.innerHTML = stats.map(function(s){
      return '<div class="stat-card"><div class="num">'+s.num+'</div><div class="label">'+s.label+'</div></div>';
    }).join('');
  }
  renderStats();

  function escapeHtml(s){
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cardHtml(d){
    var lvl = d['_displayLevel'];
    var bc = badgeClass[lvl] || 'badge-qu';
    var url = d['来源URL'] || '#';
    var srcName = d['来源名称'] || '来源';
    var conf = d['可信度'] || 'C';
    var confBadge = conf==='A'?'badge-conf-a':conf.indexOf('B')===0?'badge-conf-b':'badge-conf-c';
    var confLabel = conf==='A'?'A·可验证':conf.indexOf('B')===0?'B·可追溯':'C·待核实';
    var verifyClass = conf==='A'?'va':conf.indexOf('B')===0?'vb':'vc';
    // 生成大众点评搜索链接
    var cityId = dpCityId[d['城市']] || 2;
    var searchName = d['门店名'].replace(/(烤鸭店|饭庄|饭店|酒楼|酒家|餐厅|餐馆|菜馆|面馆|小吃店|食府|药膳坊|酱园|腐乳店|酒厂)$/,'');
    var dpSearchUrl = 'https://www.dianping.com/search/keyword/'+cityId+'/0_'+encodeURIComponent(searchName);
    // POI链接区域
    var poiHtml = '';
    if(d['poi_id']){
      poiHtml = '<div class="poi-link"><span class="k">美团POI：</span>'
        + '<a href="https://www.dianping.com/shop/'+d['poi_id']+'" target="_blank" rel="noopener" class="poi-direct">'+d['poi_id']+' ↗</a></div>';
    } else {
      poiHtml = '<div class="poi-link"><span class="k">美团POI：</span>'
        + '<a href="'+dpSearchUrl+'" target="_blank" rel="noopener" class="poi-search">搜索该门店 ↗</a></div>';
    }
    return '<div class="shop-card">'
      + '<div class="shop-name">'+escapeHtml(d['门店名'])
      + '<span class="badge '+bc+'">'+escapeHtml(lvl)+'</span>'
      + '<span class="badge badge-type">'+escapeHtml(d['类型'])+'</span>'
      + '<span class="badge '+confBadge+'">'+confLabel+'</span>'
      + '</div>'
      + '<div class="row"><span class="k">非遗项目：</span>'+escapeHtml(d['非遗项目'])+'</div>'
      + (d['备注']?'<div class="note">'+escapeHtml(d['备注'])+'</div>':'')
      + '<div class="source"><span class="k">来源：</span><a href="'+escapeHtml(url)+'" target="_blank" rel="noopener">'+escapeHtml(srcName)+' ↗</a></div>'
      + poiHtml
      + (d['验证说明']?'<div class="verify-info '+verifyClass+'">'+escapeHtml(d['验证说明'])+'</div>':'')
      + '</div>';
  }

  function applyFilter(){
    var fc = elCity.value, fl = elLevel.value, ft = elType.value, fconf = elConf?elConf.value:'';
    var kw = (elKeyword.value||'').trim().toLowerCase();
    var filtered = data.filter(function(d){
      if(fc && d['城市']!==fc) return false;
      if(fl && d['_displayLevel']!==fl) return false;
      if(ft && d['类型']!==ft) return false;
      if(fconf){
        var dc = d['可信度']||'C';
        if(fconf==='B'){ if(dc!=='B'&&dc!=='B+') return false; }
        else if(dc!==fconf) return false;
      }
      if(kw){
        var hay = (d['门店名']+' '+d['非遗项目']+' '+(d['备注']||'')+' '+d['城市']+' '+(d['验证说明']||'')).toLowerCase();
        if(hay.indexOf(kw)===-1) return false;
      }
      return true;
    });

    elInfo.textContent = '共匹配 ' + filtered.length + ' 条门店记录';

    if(filtered.length===0){
      elContent.innerHTML = '<div class="empty">未找到符合条件的门店，请调整筛选条件。</div>';
      return;
    }

    var html = '';
    cityOrder.forEach(function(city){
      var group = filtered.filter(function(d){ return d['城市']===city; });
      if(group.length===0) return;
      html += '<div class="city-block">'
        + '<div class="city-header" data-city="'+escapeHtml(city)+'">'
        + '<span class="city-name">'+escapeHtml(city)+'</span>'
        + '<span class="city-count">'+group.length+' 家</span>'
        + '</div>'
        + '<div class="city-body">'
        + group.map(cardHtml).join('')
        + '</div></div>';
    });
    elContent.innerHTML = html;

    // 城市标题点击折叠
    var headers = elContent.querySelectorAll('.city-header');
    for(var i=0;i<headers.length;i++){
      headers[i].addEventListener('click', function(){
        this.parentNode.classList.toggle('collapsed');
      });
    }
  }

  elCity.addEventListener('change', applyFilter);
  elLevel.addEventListener('change', applyFilter);
  elType.addEventListener('change', applyFilter);
  if(elConf) elConf.addEventListener('change', applyFilter);
  elKeyword.addEventListener('input', applyFilter);
  document.getElementById('resetBtn').addEventListener('click', function(){
    elCity.value=''; elLevel.value=''; elType.value=''; if(elConf)elConf.value=''; elKeyword.value='';
    applyFilter();
  });

  applyFilter();
})();
</script>
